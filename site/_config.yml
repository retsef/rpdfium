# Jekyll configuration for the rpdfium documentation site.
# Theme: just-the-docs (https://just-the-docs.com).
# Built and deployed by .github/workflows/pages.yml.

title: rpdfium
description: >-
  Ruby FFI bindings for PDFium — text extraction with character-level
  metadata, vector paths, images, forms, page rendering, and
  pdfplumber-style table detection.
lang: en

# GitHub Pages project site: https://retsef.github.io/rpdfium
url: https://retsef.github.io
baseurl: /rpdfium

theme: just-the-docs

# --- just-the-docs options ---------------------------------------------------

# Repository for the "Edit this page on GitHub" link and metadata.
gh_edit_link: true
gh_edit_link_text: Edit this page on GitHub
gh_edit_repository: https://github.com/retsef/rpdfium
gh_edit_branch: main
gh_edit_view_mode: tree

# Bottom-of-sidebar external links (hexapdf-style).
nav_external_links:
  - title: API Reference
    url: https://www.rubydoc.info/gems/rpdfium
  - title: Changelog
    url: https://github.com/retsef/rpdfium/blob/main/CHANGELOG.md
  - title: Benchmark suite (benchmark/)
    url: https://github.com/retsef/rpdfium/tree/main/benchmark

# Top-right auxiliary links.
aux_links:
  GitHub: https://github.com/retsef/rpdfium
  RubyGems: https://rubygems.org/gems/rpdfium
aux_links_new_tab: true

# Search (client-side, built from page content).
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Syntax highlighting and code copy button.
enable_copy_code_button: true

color_scheme: rpdfium

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

footer_content: >-
  rpdfium is Apache-2.0 licensed (same as PDFium).

# --- Jekyll core -------------------------------------------------------------

# Apply the theme layout to every page (Jekyll does not inherit a default
# layout from the theme gem on its own).
defaults:
  - scope:
      path: ""
    values:
      layout: default

plugins:
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache
  - README.md
